    <!-- Critical CSS: prevents white flash before React + full stylesheet load.
         Includes hero-critical font metrics to avoid layout shift on font swap. -->
    <style>*,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0;background:#09090b;color:#fafafa;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5}#root{min-height:100vh;background:#09090b}h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.1;letter-spacing:-0.02em}nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(9,9,11,0.8)}</style>

    <!-- DNS prefetch for all external services (resolved in parallel, zero cost) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.clarity.ms" />

    <!-- Fonts: non-render-blocking (preconnect + print-swap).
         Split into two requests:
         1. Critical body/heading fonts (Inter + Space Grotesk) — loaded first.
         2. Specialty display fonts (Bebas Neue, Barlow Condensed, JetBrains Mono)
            — only used in below-fold LED/broadcast UI, loaded after interaction. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Critical fonts: Inter (body) + Space Grotesk (headings) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" /></noscript>
    <!-- Non-critical specialty fonts: loaded after page is interactive -->
    <script>
      (function(){function loadSpecialtyFonts(){var l=document.createElement('link');l.rel='stylesheet';l.href='https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap';document.head.appendChild(l);}
      if(window.requestIdleCallback){requestIdleCallback(loadSpecialtyFonts,{timeout:3000});}else{setTimeout(loadSpecialtyFonts,2000);}})();
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is sports auction software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sports auction software is a digital platform that enables tournament organizers to conduct live player auctions for franchise-based leagues. It manages team rosters, bidding rounds, purse limits, player categories, and real-time bid tracking — replacing manual auction boards with a fully automated, broadcast-ready system."
          }
        },
        {
          "@type": "Question",
          "name": "How does cricket auction software work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cricket auction software like BidWar lets the auction operator control the session from a dashboard — selecting players, starting bid timers, and accepting bids from team owners. Team owners bid from their phones via a dedicated bidding panel. The LED display shows the live action on a projector or TV screen for the audience."
          }
        },
        {
          "@type": "Question",
          "name": "Can BidWar run IPL-style auctions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar is purpose-built for IPL-style franchise auctions. It supports player categories (Platinum, Gold, Silver, Emerging), team purse tracking, reserve prices, bid increments, unsold/retain mechanics, and a broadcast-quality LED display — the same format used in professional cricket leagues."
          }
        },
        {
          "@type": "Question",
          "name": "Does BidWar support projector and LED screens?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar includes a dedicated full-screen LED Display Mode designed for large projectors and TV screens. It features animated player cards, live bid counters, a SOLD stamp animation, team purse strips, and sponsor logo rotation — all in broadcast-quality resolution."
          }
        },
        {
          "@type": "Question",
          "name": "Is BidWar cloud-based?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar is a fully cloud-based platform. The operator dashboard, team owner panels, and LED display all run in a browser — no app downloads, no local software installation required. All bid data syncs in real time across all connected devices."
          }
        },
        {
          "@type": "Question",
          "name": "Can organizers manage multiple teams?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar supports unlimited team management within a tournament. Each team can have its own owner login, purse limit, squad size rules, and color branding. Multiple team owners can bid simultaneously from their own devices during a live auction session."
          }
        },
        {
          "@type": "Question",
          "name": "Is BidWar suitable for small local tournaments?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. BidWar is designed to scale from 2-team local club auctions to 16-team state-level franchise leagues. The free trial plan supports 2 teams at no cost, making it ideal for first-time organizers or small community tournaments."
          }
        },
        {
          "@type": "Question",
          "name": "Does BidWar support live bidding for team owners?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Each team owner gets a dedicated mobile-optimized bidding panel with a one-tap bid button, real-time purse tracker, squad overview, and live auction status. Owners can bid instantly from any smartphone without installing any application."
          }
        }
      ]
    }
