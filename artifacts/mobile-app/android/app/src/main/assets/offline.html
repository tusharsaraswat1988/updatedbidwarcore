<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BidWar — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #09090b;
        color: #fafafa;
      }
      .card { max-width: 22rem; text-align: center; }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
      p { color: #a1a1aa; line-height: 1.5; margin: 0 0 1.5rem; }
      button {
        appearance: none;
        border: 0;
        border-radius: 1rem;
        padding: 0.9rem 1.4rem;
        width: 100%;
        font-weight: 700;
        font-size: 1rem;
        background: #f59e0b;
        color: #09090b;
      }
      button:active { transform: scale(0.98); }
      .hint { margin-top: 1rem; font-size: 0.75rem; color: #52525b; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>BidWar needs a connection to load tournaments and auctions. Check your network, then try again.</p>
      <button type="button" id="retry">Retry</button>
      <p class="hint" id="status"></p>
    </div>
    <script>
      (function () {
        var status = document.getElementById("status");
        var btn = document.getElementById("retry");
        function shellUrl() {
          // Injected preference: production first, staging fallback for debug devices.
          try {
            var fromQuery = new URLSearchParams(location.search).get("shell");
            if (fromQuery) return fromQuery;
          } catch (e) {}
          return "https://bidwar.in/mobile/";
        }
        function go() {
          status.textContent = "Reconnecting…";
          location.replace(shellUrl());
        }
        btn.addEventListener("click", go);
        window.addEventListener("online", go);
        if (navigator.onLine) {
          status.textContent = "Network detected — reconnecting…";
          setTimeout(go, 400);
        }
      })();
    </script>
  </body>
</html>
