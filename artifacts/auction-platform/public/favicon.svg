<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark rounded square -->
  <rect width="180" height="180" rx="36" fill="#09090b"/>

  <!-- Gold accent arc top-right -->
  <path d="M130 20 Q160 20 160 50" stroke="#EAB308" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Gavel head -->
  <rect x="60" y="52" width="72" height="30" rx="7" fill="#EAB308"/>

  <!-- Gavel handle -->
  <rect x="93" y="78" width="14" height="52" rx="7" fill="#EAB308" opacity="0.85"/>

  <!-- Gavel strike lines -->
  <line x1="44" y1="100" x2="58" y2="86" stroke="#EAB308" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="38" y1="108" x2="50" y2="96" stroke="#EAB308" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- Sound wave dots (bid accepted) -->
  <circle cx="138" cy="112" r="4" fill="#EAB308" opacity="0.7"/>
  <circle cx="150" cy="104" r="3" fill="#EAB308" opacity="0.45"/>
  <circle cx="140" cy="124" r="2.5" fill="#EAB308" opacity="0.3"/>
</svg>
