          type: object
          required: [totalAcquired, slotsRemaining, planningRows]
          properties:
            totalAcquired:
              type: integer
            slotsRemaining:
              type: integer
            planningRows:
              type: integer

    ShowcaseEventInput:
      type: object
      required: [imageUrl, sportName, tournamentName]
      properties:
        imageUrl:
          type: string
        sportName:
          type: string
          maxLength: 60
        tournamentName:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 300
        altText:
          type: string
          maxLength: 200
        displayOrder:
          type: integer
          minimum: 0
        active:
          type: boolean
