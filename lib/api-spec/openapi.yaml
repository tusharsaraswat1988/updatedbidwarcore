    # Category schemas
    Category:
      type: object
      required: [id, tournamentId, name, createdAt]
      properties:
        id:
          type: integer
        tournamentId:
          type: integer
        name:
          type: string
        minBid:
          type: ["integer", "null"]
          description: Minimum base value for players in this category. Overrides the tournament-level default when set. Null means use tournament default (category acts as filter/grouping only unless bidIncrement or bidTiers is also set).
        bidIncrement:
          type: ["integer", "null"]
          description: Flat bid increment for this category. Overrides the tournament-level tiers when set. Null means use tournament tiers.
        bidTiers:
          type: ["string", "null"]
          description: JSON-encoded array of bid tier objects [{upTo, increment}, ...] for tiered increment logic. Overrides bidIncrement and tournament tiers when set.
        maxPlayers:
          type: ["integer", "null"]
          description: Maximum number of players from this category a team may purchase. Null means no limit.
        colorCode:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        minBid:
          type: ["integer", "null"]
