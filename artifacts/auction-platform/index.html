    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is sports auction software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sports auction software is a digital platform that enables tournament organizers to conduct live player auctions for franchise-based leagues. It manages team rosters, bidding rounds, purse limits, player categories, and real-time bid tracking — replacing manual auction boards with a fully automated, broadcast-ready system."
          }
        },
        {
          "@type": "Question",
          "name": "How does cricket auction software work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cricket auction software like BidWar lets the auction operator control the session from a dashboard — selecting players, starting bid timers, and accepting bids from team owners. Team owners bid from their phones via a dedicated bidding panel. The LED display shows the live action on a projector or TV screen for the audience."
          }
        },
        {
          "@type": "Question",
          "name": "Can BidWar run IPL-style auctions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar is purpose-built for IPL-style franchise auctions. It supports player categories (Platinum, Gold, Silver, Emerging), team purse tracking, reserve prices, bid increments, unsold/retain mechanics, and a broadcast-quality LED display — the same format used in professional cricket leagues."
          }
        },
        {
          "@type": "Question",
          "name": "Does BidWar support projector and LED screens?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar includes a dedicated full-screen LED Display Mode designed for large projectors and TV screens. It features animated player cards, live bid counters, a SOLD stamp animation, team purse strips, and sponsor logo rotation — all in broadcast-quality resolution."
          }
        },
        {
          "@type": "Question",
          "name": "Is BidWar cloud-based?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar is a fully cloud-based platform. The operator dashboard, team owner panels, and LED display all run in a browser — no app downloads, no local software installation required. All bid data syncs in real time across all connected devices."
          }
        },
        {
          "@type": "Question",
          "name": "Can organizers manage multiple teams?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BidWar supports unlimited team management within a tournament. Each team can have its own owner login, purse limit, squad size rules, and color branding. Multiple team owners can bid simultaneously from their own devices during a live auction session."
          }
        },
        {
          "@type": "Question",
          "name": "Is BidWar suitable for small local tournaments?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. BidWar is designed to scale from 2-team local club auctions to 16-team state-level franchise leagues. The free trial plan supports 2 teams at no cost, making it ideal for first-time organizers or small community tournaments."
          }
        },
        {
          "@type": "Question",
          "name": "Does BidWar support live bidding for team owners?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Each team owner gets a dedicated mobile-optimized bidding panel with a one-tap bid button, real-time purse tracker, squad overview, and live auction status. Owners can bid instantly from any smartphone without installing any application."
          }
        }
      ]
