kind = "web"
previewPath = "/"
title = "Live Sports Auction Platform"
version = "1.0.0"
id = "artifacts/auction-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24755

[services.development]
run = "pnpm --filter @workspace/auction-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/auction-platform", "run", "build" ]
run = "node artifacts/auction-platform/server.cjs"

[services.env]
PORT = "24755"
BASE_PATH = "/"
OWNER_APP_DEV_PROXY_TARGET = "http://127.0.0.1:5174"
