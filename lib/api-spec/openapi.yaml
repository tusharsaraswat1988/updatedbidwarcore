openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Live Sports Auction Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: media
  - name: tournaments
  - name: teams
  - name: players
  - name: categories
  - name: auction
  - name: analytics
  - name: global-players
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── MEDIA ──────────────────────────────────────────────────────────────────
  /upload:
    post:
      operationId: uploadImage
      tags: [media]
      summary: Upload an image to Cloudinary
      description: >
        Accepts a single image file via multipart/form-data.
        The file is uploaded to Cloudinary and the resulting HTTPS URL is returned.
        All image fields (photoUrl, logoUrl) must reference URLs returned by this endpoint.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (PNG, JPG, WebP, etc.)
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
                    description: Cloudinary HTTPS URL (https://res.cloudinary.com/...)
        "400":
          description: No file provided or file is not an image
        "503":
          description: Cloudinary environment variables not configured

  # ─── TOURNAMENTS ────────────────────────────────────────────────────────────
  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List all tournaments
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a tournament
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get a tournament by ID
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found
    patch:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
    delete:
      operationId: deleteTournament
      tags: [tournaments]
      summary: Delete a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tournaments/{tournamentId}/export:
    get:
      operationId: exportTournamentForLocal
      tags: [tournaments]
      summary: Export full tournament snapshot for local/offline mode
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament snapshot JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentExport"
        "404":
          description: Not found

  /tournaments/{tournamentId}/sync:
    post:
      operationId: syncLocalAuction
      tags: [tournaments]
      summary: Sync local offline auction results back to cloud
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: X-Export-Token
          in: header
          required: true
          schema:
            type: string
          description: 48-hour token obtained from the export endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalSyncPayload"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalSyncResult"
        "404":
          description: Not found

  /tournaments/{tournamentId}/auction/mirror:
    post:
      operationId: mirrorAuctionState
      tags: [auction]
      summary: Mirror live local auction state to cloud display (called by BidWar Local)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: X-Export-Token
          in: header
          required: true
          schema:
            type: string
          description: 48-hour token obtained from the export endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MirrorPayload"
      responses:
        "200":
          description: Mirrored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Missing export token
        "403":
          description: Invalid or expired export token

  # ─── TEAMS ──────────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/teams/scout:
    get:
      operationId: getTeamScout
      tags: [teams]
      summary: Scout intelligence — all teams' squads, purses, and unsold players
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scout data with all teams' squads, purse info, and unsold players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoutData"
        "400":
          description: Invalid tournament ID

  /tournaments/{tournamentId}/teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team by ID
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CATEGORIES ─────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /tournaments/{tournamentId}/categories/{categoryId}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PLAYERS ────────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /tournaments/{tournamentId}/registration-status:
    get:
      operationId: getRegistrationStatus
      tags: [players]
      summary: Get whether public player registration is currently open
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationStatus"

  /tournaments/{tournamentId}/register:
    post:
      operationId: registerPlayer
      tags: [players]
      summary: Public self-registration of a player (enforces deadline + limit)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "403":
          description: Registration closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationStatus"

  /tournaments/{tournamentId}/players/bulk:
    post:
      operationId: bulkCreatePlayers
      tags: [players]
      summary: Bulk create players from CSV data
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPlayerInput"
      responses:
        "200":
          description: Bulk upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPlayerResult"

  /tournaments/{tournamentId}/players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── AUCTION SESSION ─────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/auction:
    get:
      operationId: getAuctionState
      tags: [auction]
      summary: Get current auction state
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/start:
    post:
      operationId: startAuction
      tags: [auction]
      summary: Start or resume the auction
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/pause:
    post:
      operationId: pauseAuction
      tags: [auction]
      summary: Pause the auction
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/next-player:
    post:
      operationId: nextPlayer
      tags: [auction]
      summary: Move to next player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NextPlayerInput"
      responses:
        "200":
          description: Next player selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/bid:
    post:
      operationId: placeBid
      tags: [auction]
      summary: Place a bid for a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidInput"
      responses:
        "200":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"
        "400":
          description: Invalid bid

  /tournaments/{tournamentId}/auction/sell:
    post:
      operationId: sellPlayer
      tags: [auction]
      summary: Mark current player as sold to highest bidder
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/manual-sell:
    post:
      operationId: manualSell
      tags: [auction]
      summary: Manually sell current player to a specific team at a set price
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualSellInput"
      responses:
        "200":
          description: Player sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/unsold:
    post:
      operationId: markUnsold
      tags: [auction]
      summary: Mark current player as unsold
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player marked unsold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/re-auction:
    post:
      operationId: reAuctionPlayer
      tags: [auction]
      summary: Bring a previously sold/unsold player back for re-auction
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReAuctionInput"
      responses:
        "200":
          description: Player back in auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/re-auction-unsold:
    post:
      operationId: reAuctionAllUnsold
      tags: [auction]
      summary: Reset all unsold players back to available for another auction round
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All unsold players reset to available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/undo:
    post:
      operationId: undoLastAction
      tags: [auction]
      summary: Undo the last auction action
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Action undone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/reset-trial:
    post:
      operationId: resetTrialAuction
      tags: [auction]
      summary: Reset all players back to available (clears bids). First reset requires the operator/organizer password; further resets require the super admin password.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Reset complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"
        "401":
          description: Wrong password
        "403":
          description: Subsequent reset requires super admin password

  /tournaments/{tournamentId}/auction/display-overlay:
    post:
      operationId: setDisplayOverlay
      tags: [auction]
      summary: Set the LED display overlay mode (team/player/top5/banner/off)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [off, team, player, top5, banner]
      responses:
        "200":
          description: State updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/display-player-filter:
    post:
      operationId: setDisplayPlayerFilter
      tags: [auction]
      summary: Set filters for LED Player View overlay (status/category/team)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisplayPlayerFilter"
      responses:
        "200":
          description: State updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /owner/onboarding/lookup:
    post:
      operationId: lookupOwnerOnboarding
      tags: [teams]
      summary: Look up active tournaments and teams for an owner mobile number
      description: >
        Returns teams registered to the given mobile across eligible tournaments
        (license trial/active, not admin-locked, not completed). Does not expose
        access codes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mobile]
              properties:
                mobile:
                  type: string
                  minLength: 8
                  maxLength: 20
      responses:
        "200":
          description: Matching team/tournament entries
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      required:
                        - tournamentId
                        - tournamentName
                        - teamId
                        - teamName
                        - teamShortCode
                        - licenseStatus
                        - tournamentStatus
                        - requiresAccessCode
                      properties:
                        tournamentId:
                          type: integer
                        tournamentName:
                          type: string
                        teamId:
                          type: integer
                        teamName:
                          type: string
                        teamShortCode:
                          type: string
                        teamColor:
                          type: string
                          nullable: true
                        licenseStatus:
                          type: string
                        tournamentStatus:
                          type: string
                        auctionStatus:
                          type: string
                          nullable: true
                        requiresAccessCode:
                          type: boolean
        "400":
          description: Invalid mobile number

  /tournaments/{tournamentId}/teams/{teamId}/verify-access:
    post:
      operationId: verifyOwnerAccess
      tags: [teams]
      summary: Verify owner panel access code
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid:
                    type: boolean

  /tournaments/{tournamentId}/auction/fortune-wheel:
    post:
      operationId: syncFortuneWheel
      tags: [auction]
      summary: Sync fortune wheel state (active, items, winner) to all displays
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FortuneWheelSync"
      responses:
        "200":
          description: State broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/category-filter:
    post:
      operationId: setCategoryFilter
      tags: [auction]
      summary: Set active category filter for next-player selection
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
      responses:
        "200":
          description: Updated auction state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/break-timer:
    post:
      operationId: setBreakTimer
      tags: [auction]
      summary: Start or cancel a break countdown on the LED display
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [start, cancel, extend]
                durationSeconds:
                  type: integer
                  minimum: 10
                  maximum: 3600
                  description: Required for start; optional for extend (defaults to 300s / 5 min)
                message:
                  type: string
      responses:
        "200":
          description: Countdown started, extended, or cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/pre-auction-countdown:
    post:
      operationId: setPreAuctionCountdown
      tags: [auction]
      summary: Trigger a fixed 10-second pre-auction countdown on the LED display
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        description: Optional. Omitting the body or sending action=start triggers the countdown. Send action=cancel to clear it.
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [start, cancel]
                  default: start
                message:
                  type: string
      responses:
        "200":
          description: Countdown started or cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/start-timer:
    post:
      operationId: startTimer
      tags: [auction]
      summary: Start or reset the bid countdown timer
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimerInput"
      responses:
        "200":
          description: Timer started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/stop-timer:
    post:
      operationId: stopTimer
      tags: [auction]
      summary: Stop the bid countdown timer immediately (re-enables conclude actions)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Timer stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/defer-player:
    post:
      operationId: deferPlayer
      tags: [auction]
      summary: Defer the current player to the back of the queue and auto-advance to next
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player deferred, next player selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/bids:
    get:
      operationId: listBids
      tags: [auction]
      summary: Get bid history for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bid history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"

  /tournaments/{tournamentId}/cheer:
    post:
      operationId: sendCheerMessage
      tags: [auction]
      summary: Send a live viewer cheer reaction (public, no auth required)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheerInput"
      responses:
        "200":
          description: Cheer broadcast successfully
        "400":
          description: Invalid sender name or message index
        "403":
          description: Cheer messages disabled for this tournament
        "429":
          description: Too many requests — cooldown in effect

  # ─── ANALYTICS ───────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/analytics/summary:
    get:
      operationId: getTournamentSummary
      tags: [analytics]
      summary: Get high-level auction summary stats
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentSummary"

  /tournaments/{tournamentId}/analytics/team-purses:
    get:
      operationId: getTeamPurses
      tags: [analytics]
      summary: Get purse remaining and spent per team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team purse breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamPurse"

  /tournaments/{tournamentId}/analytics/top-bids:
    get:
      operationId: getTopBids
      tags: [analytics]
      summary: Get top sold players by price
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top sold players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopBidEntry"

  /tournaments/{tournamentId}/analytics/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [analytics]
      summary: Get sold/unsold counts per category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

  # ─── GLOBAL PLAYER DATABASE ───────────────────────────────────────────────────
  /global-players/search:
    get:
      operationId: searchGlobalPlayers
      tags: [global-players]
      summary: Search players across all tournaments for autocomplete / name lookup
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: "Name prefix, mobile prefix, or exact global player ID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Matching player suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GlobalPlayerSuggestion"

  /tournaments/{tournamentId}/import-sources:
    get:
      operationId: listImportSources
      tags: [global-players]
      summary: List tournaments that can be used as player import sources
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Available source tournaments with player counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportSource"

  /tournaments/{tournamentId}/import-candidates:
    get:
      operationId: listImportCandidates
      tags: [global-players]
      summary: List players from a source tournament, flagging duplicates in target
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: sourceTournamentId
          in: query
          required: true
          schema:
            type: integer
        - name: q
          in: query
          schema:
            type: string
          description: Optional name/mobile filter
      responses:
        "200":
          description: Import candidates with isDuplicate flag
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportCandidatePlayer"

  /tournaments/{tournamentId}/import-players:
    post:
      operationId: importPlayersFromTournament
      tags: [global-players]
      summary: Bulk import selected players from another tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPlayersInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPlayersResult"

  # ─── TEAM REPORTS ────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/team-reports:
    get:
      operationId: getTeamReportList
      tags: [team-reports]
      summary: List all teams with pre-auction report stats (license required)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team report summary list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamReportListItem"
        "403":
          description: Active license required

  /tournaments/{tournamentId}/team-reports/{teamId}:
    get:
      operationId: getTeamReport
      tags: [team-reports]
      summary: Full pre-auction team report data (license required)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full team report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamReportData"
        "403":
          description: Active license required
        "404":
          description: Team not found

  # ─── SHOWCASE EVENTS ─────────────────────────────────────────────────────────
  /showcase-events:
    get:
      operationId: listShowcaseEvents
      tags: [showcase]
      summary: List active showcase events (public)
      responses:
        "200":
          description: Active showcase events ordered by displayOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShowcaseEvent"

  /auth/admin/showcase-events:
    get:
      operationId: listAdminShowcaseEvents
      tags: [showcase]
      summary: List all showcase events including inactive (admin only)
      responses:
        "200":
          description: All showcase events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShowcaseEvent"
    post:
      operationId: createShowcaseEvent
      tags: [showcase]
      summary: Create a showcase event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShowcaseEventInput"
      responses:
        "201":
          description: Created showcase event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowcaseEvent"
        "403":
          description: Admin required

  /auth/admin/showcase-events/{id}:
    patch:
      operationId: updateShowcaseEvent
      tags: [showcase]
      summary: Update a showcase event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShowcaseEventInput"
      responses:
        "200":
          description: Updated showcase event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShowcaseEvent"
        "403":
          description: Admin required
        "404":
          description: Not found
    delete:
      operationId: deleteShowcaseEvent
      tags: [showcase]
      summary: Delete a showcase event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Admin required

  /auth/admin/showcase-events/reorder:
    post:
      operationId: reorderShowcaseEvents
      tags: [showcase]
      summary: Reorder showcase events (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Reordered
        "403":
          description: Admin required

  # ─── SETTINGS ───────────────────────────────────────────────────────────────
  /settings/installer-url:
    get:
      operationId: getInstallerUrl
      tags: [settings]
      summary: Get BidWar Local installer URL and version (public)
      responses:
        "200":
          description: Installer settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallerUrlSettings"

  /auth/admin/settings/installer-url:
    patch:
      operationId: updateInstallerUrl
      tags: [settings]
      summary: Update BidWar Local installer URL and version (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallerUrlSettings"
      responses:
        "200":
          description: Updated installer settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallerUrlSettings"
        "403":
          description: Admin required

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # Tournament schemas
    Tournament:
      type: object
      required: [id, name, sport, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sport:
          type: string
        sportId:
          type: ["integer", "null"]
        auctionCode:
          type: ["string", "null"]
          description: "Auto-generated 8-char code e.g. RC732504"
        venue:
          type: ["string", "null"]
        auctionDate:
          type: ["string", "null"]
        auctionTime:
          type: ["string", "null"]
        organizerName:
          type: ["string", "null"]
        organizerMobile:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        sponsorLogos:
          type: ["string", "null"]
        basePurse:
          type: integer
        minBid:
          type: integer
        bidIncrement:
          type: integer
        bidTier1UpTo:
          type: integer
        bidTier1Increment:
          type: integer
        bidTier2UpTo:
          type: integer
        bidTier2Increment:
          type: integer
        bidTier3Increment:
          type: integer
        bidTiers:
          type: ["string", "null"]
        timerSeconds:
          type: integer
        bidTimerSeconds:
          type: integer
        playerSelectionMode:
          type: string
          enum: [sequential, random, manual]
        status:
          type: string
          enum: [setup, active, paused, completed]
        registrationDeadline:
          type: ["string", "null"]
        registrationLimit:
          type: ["integer", "null"]
        resetCount:
          type: integer
        lastResetAt:
          type: ["string", "null"]
        lastResetBy:
          type: ["string", "null"]
        minimumSquadSize:
          type: integer
        maximumSquadSize:
          type: integer
        audioEnabled:
          type: boolean
        masterVolume:
          type: integer
        countdownSoundEnabled:
          type: boolean
        countdownSoundUrl:
          type: ["string", "null"]
        countdownSoundVolume:
          type: integer
        soldSoundEnabled:
          type: boolean
        soldSoundUrl:
          type: ["string", "null"]
        soldSoundVolume:
          type: integer
        breakEndMusicEnabled:
          type: boolean
        breakEndMusicUrl:
          type: ["string", "null"]
        breakEndMusicVolume:
          type: integer
        cheerMessagesEnabled:
          type: boolean
        cheerMessagePresets:
          type: ["string", "null"]
        cheerCooldownSeconds:
          type: integer
          description: "Per-viewer cheer cooldown in seconds (3–60)"
        cheerHeatMeterEnabled:
          type: boolean
          description: "Show heat level indicator on the live viewer"
        cheerFanBattleEnabled:
          type: boolean
          description: "Show per-team cheer battle counter on the live viewer"
        mainBannerUrl:
          type: ["string", "null"]
          description: "Cloudinary URL of the uploaded main banner image"
        mainBannerEnabled:
          type: boolean
          description: "When true, the LED display shows only the main banner full-screen"
        mainBannerFit:
          type: string
          enum: [cover, contain]
          description: "Image fit mode for the banner on the LED screen"
        localModeEnabled:
          type: boolean
          description: "Whether BidWar Local offline auction mode is enabled for this tournament"
        licenseStatus:
          type: string
          enum: [trial, active]
          description: "License status: trial (limited) or active (full access)"
        adminLocked:
          type: boolean
          description: "Whether the tournament has been locked by a master admin"
        matchDates:
          type: ["string", "null"]
          description: "Comma-separated ISO dates of match days e.g. '2025-03-18,2025-03-19'. When set, player availability shown as date checkboxes. Empty/null hides availability everywhere."
        createdAt:
          type: string

    CheerInput:
      type: object
      required: [teamId, reactionId]
      properties:
        teamId:
          type: integer
          description: "ID of the team the viewer is supporting"
        reactionId:
          type: integer
          minimum: 0
          maximum: 9
          description: "Index of the preset message to send"

    TournamentInput:
      type: object
      required: [name, sport]
      properties:
        name:
          type: string
        sport:
          type: string
        venue:
          type: string
        auctionDate:
          type: string
        organizerName:
          type: string
        organizerMobile:
          type: string
        logoUrl:
          type: string
        sponsorLogos:
          type: string
        basePurse:
          type: integer
        minBid:
          type: integer
        bidIncrement:
          type: integer
        bidTier1UpTo:
          type: integer
        bidTier1Increment:
          type: integer
        bidTier2UpTo:
          type: integer
        bidTier2Increment:
          type: integer
        bidTier3Increment:
          type: integer
        bidTiers:
          type: string
        timerSeconds:
          type: integer
        bidTimerSeconds:
          type: integer
        playerSelectionMode:
          type: string
          enum: [sequential, random, manual]
        minimumSquadSize:
          type: integer
        maximumSquadSize:
          type: integer
        audioEnabled:
          type: boolean
        masterVolume:
          type: integer
        countdownSoundEnabled:
          type: boolean
        countdownSoundUrl:
          type: string
        countdownSoundVolume:
          type: integer
        soldSoundEnabled:
          type: boolean
        soldSoundUrl:
          type: string
        soldSoundVolume:
          type: integer
        breakEndMusicEnabled:
          type: boolean
        breakEndMusicUrl:
          type: string
        breakEndMusicVolume:
          type: integer
        mainBannerUrl:
          type: string
        mainBannerEnabled:
          type: boolean
        mainBannerFit:
          type: string
          enum: [cover, contain]
        matchDates:
          type: string
          description: "Comma-separated ISO dates of match days e.g. '2025-03-18,2025-03-19'"

    TournamentUpdate:
      type: object
      properties:
        name:
          type: string
        sport:
          type: string
        venue:
          type: string
        auctionDate:
          type: string
        auctionTime:
          type: string
          nullable: true
        organizerName:
          type: string
        organizerMobile:
          type: string
        logoUrl:
          type: string
        sponsorLogos:
          type: string
        basePurse:
          type: integer
        minBid:
          type: integer
        bidIncrement:
          type: integer
        bidTier1UpTo:
          type: integer
        bidTier1Increment:
          type: integer
        bidTier2UpTo:
          type: integer
        bidTier2Increment:
          type: integer
        bidTier3Increment:
          type: integer
        bidTiers:
          type: string
        timerSeconds:
          type: integer
        bidTimerSeconds:
          type: integer
        playerSelectionMode:
          type: string
          enum: [sequential, random, manual]
        status:
          type: string
        registrationDeadline:
          type: ["string", "null"]
        registrationLimit:
          type: ["integer", "null"]
        minimumSquadSize:
          type: integer
        maximumSquadSize:
          type: integer
        audioEnabled:
          type: boolean
        masterVolume:
          type: integer
        countdownSoundEnabled:
          type: boolean
        countdownSoundUrl:
          type: ["string", "null"]
        countdownSoundVolume:
          type: integer
        soldSoundEnabled:
          type: boolean
        soldSoundUrl:
          type: ["string", "null"]
        soldSoundVolume:
          type: integer
        breakEndMusicEnabled:
          type: boolean
        breakEndMusicUrl:
          type: ["string", "null"]
        breakEndMusicVolume:
          type: integer
        mainBannerUrl:
          type: ["string", "null"]
        mainBannerEnabled:
          type: boolean
        mainBannerFit:
          type: string
          enum: [cover, contain]
        matchDates:
          type: ["string", "null"]
          description: "Comma-separated ISO dates of match days e.g. '2025-03-18,2025-03-19'"

    # Team schemas
    Team:
      type: object
      required: [id, tournamentId, name, shortCode, ownerName, purse, purseUsed, createdAt]
      properties:
        id:
          type: integer
        tournamentId:
          type: integer
        name:
          type: string
        shortCode:
          type: string
        ownerName:
          type: string
        ownerMobile:
          type: ["string", "null"]
        ownerEmail:
          type: ["string", "null"]
        ownerPhotoUrl:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        purse:
          type: integer
        purseUsed:
          type: integer
        isBiddingEnabled:
          type: boolean
        accessCode:
          type: ["string", "null"]
        createdAt:
          type: string

    TeamInput:
      type: object
      required: [name, shortCode, ownerName]
      properties:
        name:
          type: string
        shortCode:
          type: string
        ownerName:
          type: string
        ownerMobile:
          type: string
        ownerEmail:
          type: string
        ownerPhotoUrl:
          type: string
        color:
          type: string
        logoUrl:
          type: string
        purse:
          type: integer

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        shortCode:
          type: string
        ownerName:
          type: string
        ownerMobile:
          type: string
        ownerEmail:
          type: string
        ownerPhotoUrl:
          type: string
        color:
          type: string
        logoUrl:
          type: string
        purse:
          type: integer
        isBiddingEnabled:
          type: boolean
        regenerateCode:
          type: boolean

    # Scout schemas
    ScoutData:
      type: object
      required: [teams, unsoldPlayers]
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/ScoutTeam"
        unsoldPlayers:
          type: array
          items:
            $ref: "#/components/schemas/ScoutUnsoldPlayer"

    ScoutTeam:
      type: object
      required: [id, name, purse, purseRemaining, reservePurse, spendablePurse, slotsRequired, playersBought, maximumSquadSize, maxBidCapacity, players]
      properties:
        id:
          type: integer
        name:
          type: string
        shortCode:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        purse:
          type: integer
        purseRemaining:
          type: integer
        reservePurse:
          type: integer
        spendablePurse:
          type: integer
        slotsRequired:
          type: integer
        playersBought:
          type: integer
        maximumSquadSize:
          type: integer
        maxBidCapacity:
          type: integer
        players:
          type: array
          items:
            $ref: "#/components/schemas/ScoutSquadPlayer"

