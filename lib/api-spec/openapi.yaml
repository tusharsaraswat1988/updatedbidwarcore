openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Live Sports Auction Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: tournaments
  - name: teams
  - name: players
  - name: categories
  - name: auction
  - name: analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── TOURNAMENTS ────────────────────────────────────────────────────────────
  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List all tournaments
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a tournament
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get a tournament by ID
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found
    patch:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
    delete:
      operationId: deleteTournament
      tags: [tournaments]
      summary: Delete a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tournaments/{tournamentId}/export:
    get:
      operationId: exportTournamentForLocal
      tags: [tournaments]
      summary: Export full tournament snapshot for local/offline mode
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament snapshot JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentExport"
        "404":
          description: Not found

  /tournaments/{tournamentId}/sync:
    post:
      operationId: syncLocalAuction
      tags: [tournaments]
      summary: Sync local offline auction results back to cloud
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalSyncPayload"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalSyncResult"
        "404":
          description: Not found

  # ─── TEAMS ──────────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team by ID
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CATEGORIES ─────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /tournaments/{tournamentId}/categories/{categoryId}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PLAYERS ────────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /tournaments/{tournamentId}/players/bulk:
    post:
      operationId: bulkCreatePlayers
      tags: [players]
      summary: Bulk create players from CSV data
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPlayerInput"
      responses:
        "200":
          description: Bulk upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPlayerResult"

  /tournaments/{tournamentId}/players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── AUCTION SESSION ─────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/auction:
    get:
      operationId: getAuctionState
      tags: [auction]
      summary: Get current auction state
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/start:
    post:
      operationId: startAuction
      tags: [auction]
      summary: Start or resume the auction
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/pause:
    post:
      operationId: pauseAuction
      tags: [auction]
      summary: Pause the auction
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/next-player:
    post:
      operationId: nextPlayer
      tags: [auction]
      summary: Move to next player
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NextPlayerInput"
      responses:
        "200":
          description: Next player selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/bid:
    post:
      operationId: placeBid
      tags: [auction]
      summary: Place a bid for a team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidInput"
      responses:
        "200":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"
        "400":
          description: Invalid bid

  /tournaments/{tournamentId}/auction/sell:
    post:
      operationId: sellPlayer
      tags: [auction]
      summary: Mark current player as sold to highest bidder
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/manual-sell:
    post:
      operationId: manualSell
      tags: [auction]
      summary: Manually sell current player to a specific team at a set price
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualSellInput"
      responses:
        "200":
          description: Player sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/unsold:
    post:
      operationId: markUnsold
      tags: [auction]
      summary: Mark current player as unsold
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player marked unsold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/re-auction:
    post:
      operationId: reAuctionPlayer
      tags: [auction]
      summary: Bring a previously sold/unsold player back for re-auction
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReAuctionInput"
      responses:
        "200":
          description: Player back in auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/re-auction-unsold:
    post:
      operationId: reAuctionAllUnsold
      tags: [auction]
      summary: Reset all unsold players back to available for another auction round
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All unsold players reset to available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/undo:
    post:
      operationId: undoLastAction
      tags: [auction]
      summary: Undo the last auction action
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Action undone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/reset-trial:
    post:
      operationId: resetTrialAuction
      tags: [auction]
      summary: Reset all players back to available (clears trial bids)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/team-purse-view:
    post:
      operationId: setTeamPurseView
      tags: [auction]
      summary: Toggle team purse view on LED displays
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: State updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/teams/{teamId}/verify-access:
    post:
      operationId: verifyOwnerAccess
      tags: [teams]
      summary: Verify owner panel access code
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid:
                    type: boolean

  /tournaments/{tournamentId}/auction/fortune-wheel:
    post:
      operationId: syncFortuneWheel
      tags: [auction]
      summary: Sync fortune wheel state (active, items, winner) to all displays
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FortuneWheelSync"
      responses:
        "200":
          description: State broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/category-filter:
    post:
      operationId: setCategoryFilter
      tags: [auction]
      summary: Set active category filter for next-player selection
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
      responses:
        "200":
          description: Updated auction state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/start-timer:
    post:
      operationId: startTimer
      tags: [auction]
      summary: Start or reset the bid countdown timer
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimerInput"
      responses:
        "200":
          description: Timer started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/defer-player:
    post:
      operationId: deferPlayer
      tags: [auction]
      summary: Defer the current player to the back of the queue and auto-advance to next
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player deferred, next player selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /tournaments/{tournamentId}/auction/bids:
    get:
      operationId: listBids
      tags: [auction]
      summary: Get bid history for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bid history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"

  # ─── ANALYTICS ───────────────────────────────────────────────────────────────
  /tournaments/{tournamentId}/analytics/summary:
    get:
      operationId: getTournamentSummary
      tags: [analytics]
      summary: Get high-level auction summary stats
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentSummary"

  /tournaments/{tournamentId}/analytics/team-purses:
    get:
      operationId: getTeamPurses
      tags: [analytics]
      summary: Get purse remaining and spent per team
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team purse breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamPurse"

  /tournaments/{tournamentId}/analytics/top-bids:
    get:
      operationId: getTopBids
      tags: [analytics]
      summary: Get top sold players by price
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Top sold players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopBidEntry"

  /tournaments/{tournamentId}/analytics/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [analytics]
      summary: Get sold/unsold counts per category
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # Tournament schemas
    Tournament:
      type: object
      required: [id, name, sport, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sport:
          type: string
        venue:
          type: ["string", "null"]
        auctionDate:
          type: ["string", "null"]
        organizerName:
          type: ["string", "null"]
        organizerMobile:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        sponsorLogos:
          type: ["string", "null"]
        basePurse:
          type: integer
        minBid:
          type: integer
        bidIncrement:
          type: integer
        bidTier1UpTo:
          type: integer
        bidTier1Increment:
          type: integer
        bidTier2UpTo:
          type: integer
        bidTier2Increment:
          type: integer
        bidTier3Increment:
          type: integer
        bidTiers:
          type: ["string", "null"]
        timerSeconds:
          type: integer
        bidTimerSeconds:
          type: integer
        playerSelectionMode:
          type: string
          enum: [sequential, random, manual]
        status:
          type: string
          enum: [setup, active, paused, completed]
        createdAt:
          type: string

    TournamentInput:
      type: object
      required: [name, sport]
      properties:
        name:
          type: string
        sport:
          type: string
          enum: [cricket, football, kabaddi, badminton, volleyball, esports, other]
        venue:
          type: string
        auctionDate:
          type: string
        organizerName:
          type: string
        organizerMobile:
          type: string
        logoUrl:
          type: string
        sponsorLogos:
          type: string
        basePurse:
          type: integer
        minBid:
          type: integer
        bidIncrement:
          type: integer
        bidTier1UpTo:
