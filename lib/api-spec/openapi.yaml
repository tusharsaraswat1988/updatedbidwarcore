        bidIncrement:
          type: ["integer", "null"]
          description: Flat bid increment override for this category. Leave null to use tournament tiers.
        bidTiers:
          type: ["string", "null"]
          description: JSON-encoded tiered increment array. Takes precedence over bidIncrement when set.
        maxPlayers:
          type: ["integer", "null"]
          description: Maximum players per team in this category. Leave null for no limit.
        colorCode:
          type: string
        sortOrder:
          type: integer

